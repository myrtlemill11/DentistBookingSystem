name: .NET Console Build on newBranch

on:
  push:
    branches: [ "newBranch" ]
  pull_request:
    branches: [ "newBranch" ]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest]
        dotnet-version: [8.0.x]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    env:
      Solution_Name: consoleBookingSystem2/consoleBookingSystem2.slnx
      Test_Project_Path: ConsoleBookingSystemTest/ConsoleBookingSystemTest.slnx
      
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: List repo contents
        run: Get-ChildItem -Recurse | Select-Object FullName

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: path-to-output-directory

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Generate coverage report
        run: dotnet test --collect:"XPlat Code Coverage"
  
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore "${env:Solution_Name}"

      - name: Build console app
        run: dotnet build "${env:Solution_Name}" --no-restore --configuration Release

      - name: Run tests
        run: dotnet test "${env:Test_Project_Path}" --no-build --configuration Release

      
